/home/rldc/RLdC_AiNalyzator/RLdC_AiNalyzator/logs/runtime/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 rldc rldc
    sharedscripts
    postrotate
        # Sygnał do serwisów żeby zaczęły pisać do nowego pliku (SIGUSR1 nie ma sensu dla Python/Node)
        # systemd obsłuży to przez append — po rotate plik zostanie stworzony na nowo przy kolejnym restarcie
        # lub przy okazji "journalctl" dla niezjournalowanych serwisów
        touch /home/rldc/RLdC_AiNalyzator/RLdC_AiNalyzator/logs/runtime/.rotated 2>/dev/null || true
    endscript
}
